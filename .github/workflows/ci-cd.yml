name: CI/CD Pipeline

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - services/api-gateway
          - services/authentication
          - services/vessel-tracking
          - services/container-tracking
          - services/ai-prediction
          - services/auction
          - services/slot-management
          - services/ulip-integration
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.service
          push: false
          build-args: |
            SERVICE_PATH=${{ matrix.service }}
          tags: port-to-shelf/${{ matrix.service }}:${{ github.sha }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/namespace.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/configmap.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/services.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/ingress.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/hpa/hpa.yaml
      - name: Apply manifests to staging
        if: ${{ secrets.STAGING_KUBECONFIG_B64 != '' }}
        run: |
          echo "${{ secrets.STAGING_KUBECONFIG_B64 }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          kubectl apply -f docs/deployment/k8s/base/namespace.yaml
          kubectl apply -f docs/deployment/k8s/base/configmap.yaml
          kubectl apply -f docs/deployment/k8s/base/services.yaml
          kubectl apply -f docs/deployment/k8s/base/ingress.yaml
          kubectl apply -f docs/deployment/k8s/hpa/hpa.yaml

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke test script
        env:
          SMOKE_BASE_URL: ${{ vars.STAGING_BASE_URL }}
        run: bash scripts/smoke/smoke-test.sh
