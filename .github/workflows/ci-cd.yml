name: CI/CD Pipeline

permissions: 
  contents: read 
  packages: write

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run checkpoint:final

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api-gateway
            path: services/api-gateway
            dockerfile: Dockerfile.service
          - name: authentication
            path: services/authentication
            dockerfile: Dockerfile.service
          - name: vessel-tracking
            path: services/vessel-tracking
            dockerfile: Dockerfile.service
          - name: container-tracking
            path: services/container-tracking
            dockerfile: Dockerfile.service
          - name: ai-prediction
            path: services/ai-prediction
            dockerfile: Dockerfile.service
          - name: auction
            path: services/auction
            dockerfile: Dockerfile.service
          - name: slot-management
            path: services/slot-management
            dockerfile: Dockerfile.service
          - name: ulip-integration
            path: services/ulip-integration
            dockerfile: Dockerfile.service
          - name: frontend
            path: services/frontend
            dockerfile: Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Preflight TypeScript build for target workspace
        shell: bash
        run: |
          set -euo pipefail
          npm run build --workspace @port-to-shelf/shared-types
          if [[ "${{ matrix.path }}" != "services/frontend" ]]; then
            npm run build --workspace @port-to-shelf/database
          fi
          npm run build --workspace=${{ matrix.path }}
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build_primary
        name: Build and (optionally) push image
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: |
            SERVICE_PATH=${{ matrix.path }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/port-to-shelf-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/port-to-shelf-${{ matrix.name }}:latest

      - id: build_retry
        name: Retry image build once on transient failure
        if: steps.build_primary.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          build-args: |
            SERVICE_PATH=${{ matrix.path }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/port-to-shelf-${{ matrix.name }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/port-to-shelf-${{ matrix.name }}:latest

      - name: Fail job if both build attempts failed
        if: steps.build_primary.outcome == 'failure' && steps.build_retry.outcome == 'failure'
        run: |
          echo "Both primary and retry image builds failed for ${{ matrix.name }}"
          exit 1

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: staging
    outputs:
      smoke_base_url: ${{ steps.resolve_smoke_base_url.outputs.smoke_base_url }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG_B64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install AWS CLI v2
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v unzip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Configure Kubernetes authentication
        shell: bash
        run: |
          set -euo pipefail

          aws_auth_ok=false

          if [[ -n "${AWS_ACCESS_KEY_ID:-}" && -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            echo "Using AWS credential path"
            aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
            aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
            aws configure set region "${{ vars.AWS_REGION }}"
            aws sts get-caller-identity
            aws eks update-kubeconfig --region "${{ vars.AWS_REGION }}" --name "${{ vars.EKS_CLUSTER_NAME }}"

            if kubectl get nodes >/dev/null 2>&1; then
              aws_auth_ok=true
              echo "AWS-based kubectl authentication succeeded"
            else
              echo "AWS credentials are valid, but Kubernetes API authentication/authorization failed."
              echo "This usually means EKS access entry / aws-auth RBAC mapping is missing for the IAM principal."
            fi
          fi

          if [[ "$aws_auth_ok" != "true" ]]; then
            if [[ -n "${STAGING_KUBECONFIG_B64:-}" ]]; then
              echo "Falling back to kubeconfig secret path"
              echo "$STAGING_KUBECONFIG_B64" | base64 -d > kubeconfig
              echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"
              export KUBECONFIG=$PWD/kubeconfig
              kubectl get nodes
            else
              echo "No usable Kubernetes auth path configured."
              echo "Provide one of:"
              echo "1) IAM principal with EKS access entry + RBAC mapping for AWS credentials path"
              echo "2) STAGING_KUBECONFIG_B64 fallback secret"
              echo "Suggested EKS access fix (run once with admin principal):"
              echo "aws eks create-access-entry --cluster-name ${{ vars.EKS_CLUSTER_NAME }} --principal-arn <IAM_PRINCIPAL_ARN> --type STANDARD --region ${{ vars.AWS_REGION }}"
              echo "aws eks associate-access-policy --cluster-name ${{ vars.EKS_CLUSTER_NAME }} --principal-arn <IAM_PRINCIPAL_ARN> --policy-arn arn:aws:eks::aws:cluster-access-policy/AmazonEKSClusterAdminPolicy --access-scope type=cluster --region ${{ vars.AWS_REGION }}"
              exit 1
            fi
          fi

      - name: Validate manifests
        run: |
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/namespace.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/configmap.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/services.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/base/ingress.yaml
          kubectl apply --dry-run=client -f docs/deployment/k8s/hpa/hpa.yaml

      - name: Deploy application manifests
        run: |
          kubectl apply -f docs/deployment/k8s/base/namespace.yaml
          kubectl apply -f docs/deployment/k8s/base/configmap.yaml
          kubectl apply -f docs/deployment/k8s/base/services.yaml
          kubectl apply -f docs/deployment/k8s/base/ingress.yaml
          kubectl apply -f docs/deployment/k8s/hpa/hpa.yaml

      - name: Pin deployments to immutable image tags
        shell: bash
        run: |
          set -euo pipefail

          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          namespace="port-to-shelf"

          for service in api-gateway authentication vessel-tracking container-tracking ai-prediction slot-management auction ulip-integration frontend; do
            image="ghcr.io/${owner}/port-to-shelf-${service}:${{ github.sha }}"
            echo "Setting deployment/${service} image to ${image}"
            kubectl -n "$namespace" set image "deployment/${service}" "${service}=${image}"
          done

      - name: Verify rollout status
        shell: bash
        run: |
          set -euo pipefail

          namespace="port-to-shelf"
          timeout="420s"
          deployments=(
            api-gateway
            authentication
            vessel-tracking
            container-tracking
            ai-prediction
            slot-management
            auction
            ulip-integration
            frontend
          )

          failed=0
          for deployment in "${deployments[@]}"; do
            echo "Checking rollout for deployment/${deployment} with timeout ${timeout}"
            if kubectl -n "$namespace" rollout status "deployment/${deployment}" --timeout="$timeout"; then
              continue
            fi

            failed=1
            echo "::error::Rollout failed for deployment/${deployment}. Capturing diagnostics..."
            kubectl -n "$namespace" describe deployment "$deployment" || true
            kubectl -n "$namespace" get rs -l app="$deployment" -o wide || true
            kubectl -n "$namespace" get pods -l app="$deployment" -o wide || true

            non_running_pods=$(kubectl -n "$namespace" get pods -l app="$deployment" --field-selector=status.phase!=Running -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)
            if [[ -n "$non_running_pods" ]]; then
              for pod in $non_running_pods; do
                echo "----- describe pod/$pod -----"
                kubectl -n "$namespace" describe pod "$pod" || true
                echo "----- recent logs pod/$pod -----"
                kubectl -n "$namespace" logs "$pod" --all-containers --tail=200 || true
              done
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "One or more deployments failed rollout checks."
            exit 1
          fi

      - id: resolve_smoke_base_url
        name: Resolve staging smoke base URL
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          configured_url="${{ vars.STAGING_BASE_URL }}"
          resolved_url=""
          auto_discovered_url=""

          if [[ -n "$configured_url" ]]; then
            resolved_url="$configured_url"
            echo "Using STAGING_BASE_URL from repo vars: $resolved_url"
          fi

          ingress_host=$(kubectl -n port-to-shelf get ingress -o jsonpath='{.items[0].status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
          ingress_ip=$(kubectl -n port-to-shelf get ingress -o jsonpath='{.items[0].status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
          svc_host=$(kubectl -n port-to-shelf get svc api-gateway -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
          svc_ip=$(kubectl -n port-to-shelf get svc api-gateway -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)

          candidate="${ingress_host:-${ingress_ip:-${svc_host:-${svc_ip:-}}}}"
          if [[ -n "$candidate" ]]; then
            auto_discovered_url="http://$candidate"
            echo "Auto-discovered staging endpoint: $auto_discovered_url"
            if [[ -z "$resolved_url" ]]; then
              resolved_url="$auto_discovered_url"
              echo "Resolved smoke URL from cluster endpoint: $resolved_url"
            elif [[ "$resolved_url" != "$auto_discovered_url" ]]; then
              echo "::warning::STAGING_BASE_URL drift detected. Configured: $resolved_url | Auto-discovered: $auto_discovered_url"
              echo "::warning::Update STAGING_BASE_URL repo variable to keep it aligned with current staging endpoint."
            fi
          elif [[ -z "$resolved_url" ]]; then
            echo "::warning::Could not resolve external endpoint from ingress/service. Smoke test may fail unless STAGING_BASE_URL is configured."
          fi

          echo "smoke_base_url=$resolved_url" >> "$GITHUB_OUTPUT"
          echo "auto_discovered_url=$auto_discovered_url" >> "$GITHUB_OUTPUT"

      - name: Capture staging endpoint hints
        if: ${{ always() }}
        run: |
          echo "Ingress resources:"
          kubectl -n port-to-shelf get ingress -o wide || true
          echo "API Gateway service:"
          kubectl -n port-to-shelf get svc api-gateway -o wide || true
          echo "Auto-discovered endpoint (from ingress/service status): ${{ steps.resolve_smoke_base_url.outputs.auto_discovered_url }}"
          echo "Resolved smoke base URL (used by smoke/tests): ${{ steps.resolve_smoke_base_url.outputs.smoke_base_url }}"
          echo "auto_discovered_url is informational output only; do not store it as a repo variable."
          echo "Set STAGING_BASE_URL repo variable only when you want to pin the staging URL manually and keep it aligned with the endpoint above."

      - name: Manual staging sanity pass (/, /health, /api/v1/vessels)
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail

          base_url="${{ steps.resolve_smoke_base_url.outputs.smoke_base_url }}"
          if [[ -z "$base_url" ]]; then
            echo "::error::No resolved staging URL available for manual sanity pass."
            exit 1
          fi
          base_url="${base_url%/}"

          echo "Running manual sanity pass against: $base_url"

          get_status() {
            local path="$1"
            local out_file="$2"
            local status
            local curl_exit

            status=$(curl --connect-timeout 5 --max-time 20 --retry 3 --retry-delay 2 --retry-connrefused -sS -o "$out_file" -w "%{http_code}" "$base_url$path") || curl_exit=$?
            if [[ -n "${curl_exit:-}" ]]; then
              echo "::warning::curl failed for $path with exit code ${curl_exit}." >&2
              status="000"
            fi

            echo "$status"
          }

          root_status=$(get_status "/" /tmp/staging-root.html)
          echo "GET / => HTTP ${root_status}"
          if [[ "$root_status" == "200" ]]; then
            echo "Root check passed (frontend served at /)."
          elif [[ "$root_status" == "401" ]]; then
            echo "::warning::Root returned 401. This usually means STAGING_BASE_URL points to api-gateway directly (API-only endpoint) instead of ingress/frontend URL."
            echo "::warning::Set STAGING_BASE_URL to the ingress URL if you want frontend + backend on one endpoint."
          else
            echo "::error::Expected '/' to return HTTP 200 (or 401 when API-only endpoint is configured), got ${root_status}."
            exit 1
          fi

          health_status=$(get_status "/health" /tmp/staging-health.json)
          echo "GET /health => HTTP ${health_status}"
          if [[ "$health_status" != "200" ]]; then
            echo "::error::Expected '/health' to return HTTP 200"
            exit 1
          fi

          vessels_status=$(get_status "/api/v1/vessels" /tmp/staging-vessels.json)
          echo "GET /api/v1/vessels => HTTP ${vessels_status}"
          if [[ "$vessels_status" != "401" ]]; then
            echo "::error::Expected '/api/v1/vessels' to return HTTP 401 without auth token"
            exit 1
          fi

          echo "Manual staging sanity pass succeeded."

  smoke-tests:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      STAGING_KUBECONFIG_B64: ${{ secrets.STAGING_KUBECONFIG_B64 }}
      RESOLVED_SMOKE_BASE_URL: ${{ needs.deploy-staging.outputs.smoke_base_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install AWS CLI v2
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v unzip >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y unzip
          fi
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          aws --version

      - name: Configure Kubernetes authentication for smoke fallback
        shell: bash
        run: |
          set -euo pipefail

          aws_auth_ok=false

          if [[ -n "${AWS_ACCESS_KEY_ID:-}" && -n "${AWS_SECRET_ACCESS_KEY:-}" ]]; then
            aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
            aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
            aws configure set region "${{ vars.AWS_REGION }}"
            aws eks update-kubeconfig --region "${{ vars.AWS_REGION }}" --name "${{ vars.EKS_CLUSTER_NAME }}"
            if kubectl get nodes >/dev/null 2>&1; then
              aws_auth_ok=true
            fi
          fi

          if [[ "$aws_auth_ok" != "true" ]]; then
            if [[ -n "${STAGING_KUBECONFIG_B64:-}" ]]; then
              echo "$STAGING_KUBECONFIG_B64" | base64 -d > kubeconfig
              echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"
              export KUBECONFIG=$PWD/kubeconfig
              kubectl get nodes >/dev/null 2>&1
            else
              echo "::warning::No Kubernetes auth path available for smoke fallback."
            fi
          fi

      - name: Run smoke test script
        shell: bash
        run: |
          set -euo pipefail

          smoke_url="${RESOLVED_SMOKE_BASE_URL:-}"
          pf_pid=""

          cleanup() {
            if [[ -n "$pf_pid" ]]; then
              kill "$pf_pid" || true
            fi
          }
          trap cleanup EXIT

          if [[ -n "$smoke_url" ]]; then
            echo "Checking reachability of resolved smoke URL: $smoke_url"
            if ! curl --connect-timeout 5 --max-time 15 -fsS "$smoke_url/health" >/dev/null 2>&1; then
              echo "Resolved smoke URL is not reachable yet; will try port-forward fallback"
              smoke_url=""
            fi
          fi

          if [[ -z "$smoke_url" ]]; then
            echo "Smoke base URL not resolved/reachable; using kubectl port-forward fallback"
            kubectl -n port-to-shelf port-forward svc/api-gateway 3000:3000 >/tmp/port-forward.log 2>&1 &
            pf_pid=$!

            for _ in {1..30}; do
              if curl --connect-timeout 2 --max-time 5 -fsS http://127.0.0.1:3000/health >/dev/null 2>&1; then
                smoke_url="http://127.0.0.1:3000"
                break
              fi
              sleep 2
            done
          fi

          if [[ -z "$smoke_url" ]]; then
            echo "::error::Unable to resolve smoke base URL or establish port-forward fallback."
            [[ -f /tmp/port-forward.log ]] && cat /tmp/port-forward.log || true
            exit 1
          fi

          frontend_check=false
          root_status=$(curl --connect-timeout 5 --max-time 10 -s -o /tmp/smoke-root.html -w "%{http_code}" "$smoke_url/" || true)
          if [[ "$root_status" == "200" ]]; then
            frontend_check=true
          fi

          echo "Frontend smoke check enabled: $frontend_check (root status: ${root_status:-n/a})"

          export SMOKE_BASE_URL="$smoke_url"
          export SMOKE_CURL_TIMEOUT_SECONDS=15
          export SMOKE_EXPECT_FRONTEND="$frontend_check"
          bash scripts/smoke/smoke-test.sh
