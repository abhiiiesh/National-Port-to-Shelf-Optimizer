apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: port-to-shelf
spec:
  replicas: 2
  selector:
    matchLabels: { app: api-gateway }
  template:
    metadata:
      labels: { app: api-gateway }
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/abhiiiesh/port-to-shelf-api-gateway:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef: { name: platform-config }
          readinessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: port-to-shelf
spec:
  type: LoadBalancer
  selector: { app: api-gateway }
  ports:
    - port: 3000
      targetPort: 3000
---
